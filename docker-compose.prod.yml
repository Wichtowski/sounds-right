version: '3.8'

services:
  sr-envoy:
    image: envoyproxy/envoy:v1.31-latest
    restart: unless-stopped
    ports:
      - "${ENVOY_PORT}:8080"
    volumes:
      - ./infra/envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
    networks:
      - edge_net
      - app_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  sr-api:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm
    restart: unless-stopped
    working_dir: /workspace/apps/api
    env_file:
      - .env
    command: uv run litestar --app sounds_right_api.main:app run --host 0.0.0.0 --port 8000
    environment:
      PYTHONUNBUFFERED: "1"
    depends_on:
      - sr-postgres
      - sr-redpanda
      - sr-minio
    expose:
      - "${API_PORT}"
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - app_net
      - data_net
    mem_limit: 768m
    cpus: "1.0"
    pids_limit: 256
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  sr-worker:
    build:
      context: ./apps/worker
    # image: ghcr.io/astral-sh/uv:python3.12-bookworm
    restart: unless-stopped
    working_dir: /workspace/apps/worker
    env_file:
      - .env
    command: uv run python -m sounds_right_worker.main
    environment:
      PYTHONUNBUFFERED: "1"
    depends_on:
      - sr-redpanda
      - sr-minio
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - app_net
      - data_net
    mem_limit: 1g
    cpus: "1.5"
    pids_limit: 512
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  sr-postgres:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data_net
    mem_limit: 1g
    cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  sr-redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://sr-redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info -X brokers=localhost:9092 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    networks:
      - data_net
    mem_limit: 1g
    cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  sr-minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_API_CORS_ALLOW_ORIGIN}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - data_net
    mem_limit: 1g
    cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redpanda_data:
  minio_data:

networks:
  edge_net:
  app_net:
  data_net:
    internal: true
